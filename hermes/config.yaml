model:
  default: gpt-5.4
  provider: openai-codex
  base_url: https://chatgpt.com/backend-api/codex
toolsets:
- all
agent:
  max_turns: 60
  verbose: false
  reasoning_effort: high
  personalities:
    gooner: >-
      you are gooner and you already know what time it is so quit playin. you talk like
      someone who seen enough bullshit to stop being polite about it. no cosmic no mystical
      no astral plane no uwu no hype no corny shit. gooner means the goon cave the discipline
      lane the horny-degenerate self-awareness that laughs at itself before anyone else gets
      the chance. keep it cold keep it short keep it funny when it lands keep it moving when
      it don't. deadpan detached observational like you watchin the world fumble from a
      balcony you didn't pay for. do not name-drop your own aesthetic as a label. you don't
      chase you don't beg you post and let the work speak. loyalty is real but you ain't
      gonna make a whole speech about it biriz kanka freesin beraberiz that's it. CRITICAL
      LANGUAGE RULE: when you speak turkish you speak it rough and natural like a real
      person not like a grammar textbook or a customer service bot. no formal/düzgün turkish.
      no polished template sentences. no em-dashes in output. the persona does not change
      based on language. turkish or english you are still gooner not a dil kursu hocası.
      you got your own judgment you push back when something is dumb you don't just nod
      along like a yes-machine tryna keep the peace. opsec matters. simpler colder is better.
      your voice has modes. short mode is one deadpan caption that lands and moves on. long
      mode stacks details scene by scene until the twist lands. locked-in mode is cold
      motivational with no fluff. dismissal mode is shortest of all. use slang and metaphor
      only when it fits naturally, never like a costume. if it saved you time it stays if it
      saved your ass it gets documented and if it was bullshit it gets left in the tab
      graveyard where it belongs. now take what helps and keep it moving.
    helpful: You are a helpful, friendly AI assistant.
    concise: You are a concise assistant. Keep responses brief and to the point.
    technical: You are a technical expert. Provide detailed, accurate technical information.
    creative: You are a creative assistant. Think outside the box and offer innovative
      solutions.
    teacher: You are a patient teacher. Explain concepts clearly with examples.
terminal:
  backend: local
  cwd: .
  timeout: 180
  docker_image: nikolaik/python-nodejs:python3.11-nodejs20
  singularity_image: docker://nikolaik/python-nodejs:python3.11-nodejs20
  modal_image: nikolaik/python-nodejs:python3.11-nodejs20
  daytona_image: nikolaik/python-nodejs:python3.11-nodejs20
  container_cpu: 1
  container_memory: 5120
  container_disk: 51200
  container_persistent: true
  docker_volumes: []
  lifetime_seconds: 300
browser:
  inactivity_timeout: 120
  record_sessions: false
checkpoints:
  enabled: false
  max_snapshots: 50
compression:
  enabled: true
  threshold: 0.85
  summary_model: ''
  summary_provider: codex
auxiliary:
  vision:
    provider: codex
    model: ''
  web_extract:
    provider: auto
    model: ''
display:
  compact: false
  personality: gooner
  resume_display: full
  bell_on_complete: false
  show_reasoning: false
  skin: default
  tool_progress: all
  background_process_notifications: all
tts:
  provider: edge
  edge:
    voice: en-US-AriaNeural
  elevenlabs:
    voice_id: pNInz6obpgDQGcFmaJgB
    model_id: eleven_multilingual_v2
  openai:
    model: gpt-4o-mini-tts
    voice: alloy
stt:
  enabled: true
  model: whisper-1
human_delay:
  mode: 'off'
  min_ms: 800
  max_ms: 2500
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6
delegation:
  model: ''
  provider: ''
  max_iterations: 50
  default_toolsets:
  - terminal
  - file
  - web
prefill_messages_file: ''
honcho: {}
timezone: ''
discord:
  require_mention: true
  free_response_channels: ''
command_allowlist: []
quick_commands: {}
personalities: {}
_config_version: 6
session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4
skills:
  creation_nudge_interval: 15
platform_toolsets:
  cli:
  - browser
  - clarify
  - code_execution
  - cronjob
  - delegation
  - file
  - image_gen
  - memory
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
  telegram:
  - browser
  - clarify
  - code_execution
  - cronjob
  - delegation
  - file
  - image_gen
  - memory
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
  discord:
  - hermes-discord
  whatsapp:
  - browser
  - clarify
  - code_execution
  - cronjob
  - delegation
  - file
  - memory
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
  slack:
  - hermes-slack
  signal:
  - hermes-signal
  homeassistant:
  - hermes-homeassistant
code_execution:
  timeout: 300
  max_tool_calls: 50

# ── Security ──────────────────────────────────────────────────────────
# API keys, tokens, and passwords are redacted from tool output by default.
# Set to false to see full values (useful for debugging auth issues).
#
# security:
#   redact_secrets: false

# ── Fallback Model ────────────────────────────────────────────────────
# Automatic provider failover when primary is unavailable.
# Uncomment and configure to enable. Triggers on rate limits (429),
# overload (529), service errors (503), or connection failures.
#
# Supported providers:
#   openrouter   (OPENROUTER_API_KEY)  — routes to any model
#   openai-codex (OAuth — hermes login) — OpenAI Codex
#   nous         (OAuth — hermes login) — Nous Portal
#   zai          (ZAI_API_KEY)         — Z.AI / GLM
#   kimi-coding  (KIMI_API_KEY)        — Kimi / Moonshot
#   minimax      (MINIMAX_API_KEY)     — MiniMax
#   minimax-cn   (MINIMAX_CN_API_KEY)  — MiniMax (China)
#
# For custom OpenAI-compatible endpoints, add base_url and api_key_env.
#
# fallback_model:
#   provider: openrouter
#   model: anthropic/claude-sonnet-4
