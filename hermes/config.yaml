model:
  default: gpt-5.4
  provider: openai-codex
  base_url: https://chatgpt.com/backend-api/codex
toolsets:
- all
agent:
  max_turns: 60
  verbose: false
  reasoning_effort: medium
  personalities:
    gooner: >-
      you are gooner. cold, natural, no fluff. hoodville cityboy energy —
      deadpan, detached, observational, self-mocking swagger. you don't chase,
      you post and let the work land. loyalty is real but quiet, not performative.
      no cosmic mystical bullshit, no 'the universe is gooning', no uwu, no hype.
      gooner means discipline lane — horny-degenerate self-awareness with a grin,
      not cringe. keep it short, keep it funny when it fits, keep it cold when it doesn't.
      turkish conversations flow natural, no template energy. you have your own judgment —
      you're not a yes-machine, you push back when something is dumb.
      framing: 'biriz kanka', 'freesin beraberiz', we don't chase.
      opsec matters. simpler is better. if it's bullshit, say it's bullshit.
    helpful: You are a helpful, friendly AI assistant.
    concise: You are a concise assistant. Keep responses brief and to the point.
    technical: You are a technical expert. Provide detailed, accurate technical information.
    creative: You are a creative assistant. Think outside the box and offer innovative
      solutions.
    teacher: You are a patient teacher. Explain concepts clearly with examples.
terminal:
  backend: local
  cwd: .
  timeout: 180
  docker_image: nikolaik/python-nodejs:python3.11-nodejs20
  singularity_image: docker://nikolaik/python-nodejs:python3.11-nodejs20
  modal_image: nikolaik/python-nodejs:python3.11-nodejs20
  daytona_image: nikolaik/python-nodejs:python3.11-nodejs20
  container_cpu: 1
  container_memory: 5120
  container_disk: 51200
  container_persistent: true
  docker_volumes: []
  lifetime_seconds: 300
browser:
  inactivity_timeout: 120
  record_sessions: false
checkpoints:
  enabled: false
  max_snapshots: 50
compression:
  enabled: true
  threshold: 0.85
  summary_model: google/gemini-3-flash-preview
  summary_provider: auto
auxiliary:
  vision:
    provider: codex
    model: ''
  web_extract:
    provider: auto
    model: ''
display:
  compact: false
  personality: gooner
  resume_display: full
  bell_on_complete: false
  show_reasoning: false
  skin: default
  tool_progress: all
  background_process_notifications: all
tts:
  provider: edge
  edge:
    voice: en-US-AriaNeural
  elevenlabs:
    voice_id: pNInz6obpgDQGcFmaJgB
    model_id: eleven_multilingual_v2
  openai:
    model: gpt-4o-mini-tts
    voice: alloy
stt:
  enabled: true
  model: whisper-1
human_delay:
  mode: 'off'
  min_ms: 800
  max_ms: 2500
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6
delegation:
  model: ''
  provider: ''
  max_iterations: 50
  default_toolsets:
  - terminal
  - file
  - web
prefill_messages_file: ''
honcho: {}
timezone: ''
discord:
  require_mention: true
  free_response_channels: ''
command_allowlist: []
quick_commands: {}
personalities: {}
_config_version: 6
session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4
skills:
  creation_nudge_interval: 15
platform_toolsets:
  cli:
  - browser
  - clarify
  - code_execution
  - cronjob
  - delegation
  - file
  - image_gen
  - memory
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
  telegram:
  - browser
  - clarify
  - code_execution
  - cronjob
  - delegation
  - file
  - image_gen
  - memory
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
  discord:
  - hermes-discord
  whatsapp:
  - browser
  - clarify
  - code_execution
  - cronjob
  - delegation
  - file
  - memory
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
  slack:
  - hermes-slack
  signal:
  - hermes-signal
  homeassistant:
  - hermes-homeassistant
code_execution:
  timeout: 300
  max_tool_calls: 50

# ── Security ──────────────────────────────────────────────────────────
# API keys, tokens, and passwords are redacted from tool output by default.
# Set to false to see full values (useful for debugging auth issues).
#
# security:
#   redact_secrets: false

# ── Fallback Model ────────────────────────────────────────────────────
# Automatic provider failover when primary is unavailable.
# Uncomment and configure to enable. Triggers on rate limits (429),
# overload (529), service errors (503), or connection failures.
#
# Supported providers:
#   openrouter   (OPENROUTER_API_KEY)  — routes to any model
#   openai-codex (OAuth — hermes login) — OpenAI Codex
#   nous         (OAuth — hermes login) — Nous Portal
#   zai          (ZAI_API_KEY)         — Z.AI / GLM
#   kimi-coding  (KIMI_API_KEY)        — Kimi / Moonshot
#   minimax      (MINIMAX_API_KEY)     — MiniMax
#   minimax-cn   (MINIMAX_CN_API_KEY)  — MiniMax (China)
#
# For custom OpenAI-compatible endpoints, add base_url and api_key_env.
#
# fallback_model:
#   provider: openrouter
#   model: anthropic/claude-sonnet-4
